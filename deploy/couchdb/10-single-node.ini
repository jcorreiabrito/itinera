; Single-node CouchDB configuration for Itinera.
; Mounted read-only into /opt/couchdb/etc/local.d/ by docker-compose.yml.
;
; `single_node = true` makes CouchDB create the system databases
; (`_users, _replicator, _global_changes`) automatically on first start, so there
; is no manual cluster-setup step. Must be false for a real cluster.
[couchdb]
single_node = true

[chttpd]
; Listen on all interfaces inside the container (reached only via Caddy on the
; internal Docker network – never published to the host).
bind_address = 0.0.0.0

; Defense-in-depth: reject anonymous requests even on the internal Docker network,
; so a process that reaches CouchDB directly (bypassing Caddy) still can't read data.
; Caddy injects admin Basic-auth on every /db/* request, so the proxied app path is
; unaffected. `require_valid_user_except_for_up = true` keeps the UNAUTHENTICATED /_up readiness probe
; (docker-compose.yml healthcheck) working, which fastapi's depends_on relies on.
require_valid_user = true
require_valid_user_except_for_up = true