<!doctype html>
<html lang="en" class="h-full">

    <meta charset="utf-8" />

    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2f6b4f" />
    <meta
      name="description"
      content="Itinera – your cozy, offline-first travel planner."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Itinera" />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="h-full bg-bg text-ink antialiased"

    <div style="display: contents" class="h-full">%sveltekit.body%</div>
